name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  standards:
    name: Standards Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: progression-labs-dev/github-actions/python-standards-check@main
        with:
          uv-sync-args: "--extra all --extra dev"
          gcp-workload-identity-provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          gcp-service-account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          conform-package: "@progression-labs/conform"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [standards]

    steps:
      - uses: actions/checkout@v4

      - uses: progression-labs-dev/github-actions/python-test@main
        with:
          uv-sync-args: "--extra all --extra dev"
          pytest-args: '-m "not integration" --tb=short -v'
          coverage-threshold: "80"
